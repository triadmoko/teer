name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GONOSUMDB: "github.com/wailsapp/wails/v3"
  GONOSUMCHECK: "github.com/wailsapp/wails/v3"
  GOFLAGS: "-mod=mod"

jobs:
  build-linux:
    name: Build Linux (amd64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev gcc

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Install tools
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.104
          go install github.com/go-task/task/v3/cmd/task@latest

      - name: Build
        run: task linux:build VERSION=${{ github.ref_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: teer-linux-amd64
          path: bin/Teer

  build-windows:
    name: Build Windows (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Install tools
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.104
          go install github.com/go-task/task/v3/cmd/task@latest

      - name: Build
        run: task windows:build VERSION=${{ github.ref_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: teer-windows-amd64
          path: bin/Teer.exe

  build-macos-universal:
    name: Build macOS Universal (.app)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Install tools
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.104
          go install github.com/go-task/task/v3/cmd/task@latest

      - name: Build universal
        run: task darwin:build:universal VERSION=${{ github.ref_name }}

      - name: Package .app
        run: task darwin:package:universal

      - name: Zip .app
        run: cd bin && zip -r teer-macos-universal.zip Teer.app

      - uses: actions/upload-artifact@v4
        with:
          name: teer-macos-universal
          path: bin/teer-macos-universal.zip

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos-universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Rename Linux binary
        run: mv dist/Teer dist/teer-linux-amd64

      - name: Rename Windows binary
        run: mv dist/Teer.exe dist/teer-windows-amd64.exe

      - name: List artifacts
        run: ls -lh dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/teer-linux-amd64
            dist/teer-windows-amd64.exe
            dist/teer-macos-universal.zip
