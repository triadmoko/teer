name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux (amd64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev gcc

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Install wails3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.104

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build
        run: |
          VERSION="${{ github.ref_name }}"
          cd frontend && bun run build && cd ..
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -tags production -trimpath -buildvcs=false \
            -ldflags="-w -s -X main.Version=${VERSION}" \
            -o bin/teer-linux-amd64 .

      - uses: actions/upload-artifact@v4
        with:
          name: teer-linux-amd64
          path: bin/teer-linux-amd64

  build-windows:
    name: Build Windows (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Install wails3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.104

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          cd frontend && bun run build && cd ..
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -tags production -trimpath -buildvcs=false \
            -ldflags="-w -s -H windowsgui -X main.Version=${VERSION}" \
            -o bin/teer-windows-amd64.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: teer-windows-amd64
          path: bin/teer-windows-amd64.exe

  build-macos-universal:
    name: Build macOS Universal (.app)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Install wails3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.104

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: cd frontend && bun run build

      - name: Build arm64
        run: |
          VERSION="${{ github.ref_name }}"
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            CGO_CFLAGS="-mmacosx-version-min=12.0" \
            CGO_LDFLAGS="-mmacosx-version-min=12.0" \
            MACOSX_DEPLOYMENT_TARGET="12.0" \
            go build -tags production -trimpath -buildvcs=false \
            -ldflags="-w -s -X main.Version=${VERSION}" \
            -o bin/teer-darwin-arm64 .

      - name: Build amd64
        run: |
          VERSION="${{ github.ref_name }}"
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
            CGO_CFLAGS="-mmacosx-version-min=12.0" \
            CGO_LDFLAGS="-mmacosx-version-min=12.0" \
            MACOSX_DEPLOYMENT_TARGET="12.0" \
            go build -tags production -trimpath -buildvcs=false \
            -ldflags="-w -s -X main.Version=${VERSION}" \
            -o bin/teer-darwin-amd64 .

      - name: Create universal binary
        run: lipo -create -output bin/teer bin/teer-darwin-arm64 bin/teer-darwin-amd64

      - name: Package .app bundle
        run: |
          mkdir -p bin/Teer.app/Contents/MacOS
          mkdir -p bin/Teer.app/Contents/Resources
          cp build/darwin/icons.icns bin/Teer.app/Contents/Resources/
          [ -f build/darwin/Assets.car ] && cp build/darwin/Assets.car bin/Teer.app/Contents/Resources/
          cp bin/teer bin/Teer.app/Contents/MacOS/teer
          cp build/darwin/Info.plist bin/Teer.app/Contents/Info.plist
          codesign --force --deep --sign - bin/Teer.app

      - name: Zip .app
        run: cd bin && zip -r teer-macos-universal.zip Teer.app

      - uses: actions/upload-artifact@v4
        with:
          name: teer-macos-universal
          path: bin/teer-macos-universal.zip

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos-universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/teer-linux-amd64
            dist/teer-windows-amd64.exe
            dist/teer-macos-universal.zip
