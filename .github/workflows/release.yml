name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install wails3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.82

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev gcc

      - name: Build
        run: |
          VERSION="${{ github.ref_name }}"
          cd frontend && npm run build && cd ..
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -tags production -trimpath -buildvcs=false \
            -ldflags="-w -s -X main.Version=${VERSION}" \
            -o bin/teer-linux-amd64 .

      - uses: actions/upload-artifact@v4
        with:
          name: teer-linux-amd64
          path: bin/teer-linux-amd64

  build-windows:
    name: Build Windows (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install wails3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.82

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          cd frontend && npm run build && cd ..
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -tags production -trimpath -buildvcs=false \
            -ldflags="-w -s -H windowsgui -X main.Version=${VERSION}" \
            -o bin/teer-windows-amd64.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: teer-windows-amd64
          path: bin/teer-windows-amd64.exe

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/teer-linux-amd64
            dist/teer-windows-amd64.exe
